<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Résona</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        body {
            background-color: #15130e; /* Matches Graphite #16140F/background */
            color: #e8e2d9;
        }

        .auth-card {
            background-color: #1e1c16; /* Level 1 Elevated Surface */
            border: 1px solid #2a2822; /* 1px hairline border */
        }

        .input-field {
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            border-color: #e6c479; /* Champagne Gold focus */
            outline: none;
        }

        .btn-hover:hover {
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1));
        }

        .step-indicator-active {
            height: 3px;
            background-color: #e6c479;
        }

        /* Subtle atmospheric drift */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(201, 169, 97, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
    </style>

                    "on-tertiary-fixed": "#091843",
                    "inverse-on-surface": "#33302a",

                    "surface-container-highest": "#37342f",
                    "on-background": "#e8e2d9",

                    "on-primary": "#3f2e00",

                    "surface-container-lowest": "#100e09",
                    "tertiary-container": "#9eabde",
                    "on-secondary-fixed": "#1d1b15",
                    "primary": "#e6c479",
                    "on-primary-fixed-variant": "#5a4302",
                    "inverse-primary": "#745b1b",
                    "on-tertiary-container": "#313f6b",
                    "surface-tint": "#e4c278",
                    "on-surface": "#e8e2d9",
                    "outline-variant": "#4d4639",
                    "primary-fixed-dim": "#e4c278",
                    "error-container": "#93000a",
                    "secondary-fixed": "#e8e2d8"
            },
            "borderRadius": {

<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop overflow-x-hidden">
<!-- Background Shader Animation -->
<div class="fixed inset-0 z-[-1]">

</div>
<div class="ambient-glow"></div>
<!-- Header / Brand Anchor -->
<header class="mb-12 text-center z-10">
<h1 class="font-headline-lg text-headline-lg md:text-[40px] tracking-tight text-on-background">Résona</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-2 tracking-wide uppercase">Precise Minimalism in Career Analytics</p>
</header>
<!-- Main Auth Card -->
<main class="w-full max-w-[440px] z-10">
<div class="auth-card p-8 md:p-10 rounded-lg shadow-none">
<!-- Step Indicator (Visual Decoration) -->
<div class="w-full h-[1px] bg-outline-variant mb-8 relative">
<div class="step-indicator-active absolute top-0 left-0 w-1/2"></div>
<div class="mt-4 flex justify-between">
<span class="font-label-md text-label-md text-primary uppercase">Identity</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Experience</span>
</div>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-6">Create your profile</h2>
<!-- OAuth Buttons -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded border border-outline-variant hover:bg-surface-container-high transition-all text-on-surface font-body-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12.48 10.92v3.28h7.84c-.24 1.84-.9 3.38-2.04 4.52-1.14 1.14-2.84 2.22-5.8 2.22-4.72 0-8.64-3.8-8.64-8.52S7.76 3.9 12.48 3.9c2.48 0 4.5 1 5.9 2.32l2.32-2.32C18.6 1.84 15.86.5 12.48.5 6.48.5 1.5 5.48 1.5 11.5s4.98 11 10.98 11c3.24 0 5.82-1.06 7.74-3.04 2.02-2.02 2.66-4.88 2.66-7.22 0-.66-.06-1.3-.18-1.92h-8.16z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded border border-outline-variant hover:bg-surface-container-high transition-all text-on-surface font-body-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.23 0H1.77C.8 0 0 .77 0 1.72v20.56C0 23.23.8 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.2 0 22.23 0zM7.12 20.45H3.56V9h3.56v11.45zM5.34 7.43c-1.14 0-2.06-.92-2.06-2.06 0-1.14.92-2.06 2.06-2.06 1.14 0 2.06.92 2.06 2.06 0 1.14-.92 2.06-2.06 2.06zM20.45 20.45h-3.56v-5.6c0-1.34-.03-3.06-1.87-3.06-1.87 0-2.15 1.46-2.15 2.96v5.7h-3.56V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29z" fill="#0077B5"></path>
</svg>
                    Continue with LinkedIn
                </button>
</div>
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-md text-label-md text-outline uppercase">or use email</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Email & Password Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="input-field w-full bg-transparent border border-outline-variant rounded p-3 text-on-surface font-body-md placeholder:text-outline/50" id="email" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<input class="input-field w-full bg-transparent border border-outline-variant rounded p-3 text-on-surface font-body-md placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-fixed font-body-md font-bold py-4 rounded btn-hover transition-transform active:scale-[0.98] mt-4">
                    Create Account
                </button>
</form>
<p class="text-center mt-8 font-body-sm text-body-sm text-on-surface-variant">
                By signing up, you agree to our 
                <a class="text-primary hover:underline underline-offset-4" href="#">Terms</a> and 
                <a class="text-primary hover:underline underline-offset-4" href="#">Privacy Policy</a>.
            </p>
</div>
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 transition-all" href="#">Log in</a>
</p>
</div>
</main>
<!-- Footer Identity -->
<footer class="mt-auto py-12 w-full max-w-container-max flex flex-col md:flex-row justify-between items-center border-t border-outline-variant/30 text-on-surface-variant font-body-sm text-body-sm px-margin-mobile">
<span>© 2024 Résona. All rights reserved.</span>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="hover:text-primary transition-colors" href="#">Support</a>
<a class="hover:text-primary transition-colors" href="#">Security</a>
<a class="hover:text-primary transition-colors" href="#">Methodology</a>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.input-field');
            
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    const label = input.parentElement.querySelector('label');
                    if (label) label.classList.add('text-primary');
                });
                
                input.addEventListener('blur', () => {
                    const label = input.parentElement.querySelector('label');
                    if (label) label.classList.remove('text-primary');
                });
            });

            // Toggle Password Visibility
            const visibilityBtn = document.querySelector('[data-icon="visibility"]').parentElement;
            const passwordInput = document.getElementById('password');
            let visible = false;

            visibilityBtn.addEventListener('click', () => {
                visible = !visible;
                passwordInput.type = visible ? 'text' : 'password';
                visibilityBtn.querySelector('span').textContent = visible ? 'visibility_off' : 'visibility';
            });
        });
    </script>
</body></html>
