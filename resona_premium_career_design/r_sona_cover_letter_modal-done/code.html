<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Résona | Cover Letter Preview</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100..900&family=Space+Grotesk:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .paper-texture {
            background-image: radial-gradient(#2a2822 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .modal-blur {
            backdrop-filter: blur(8px);
            background-color: rgba(21, 19, 14, 0.8);
        }
        /* Custom scrollbar for minimalist look */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e1c16;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4d4639;
            border-radius: 2px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #e6c479;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#3c3933",
                        "background": "#15130e",
                        "on-tertiary-fixed": "#091843",
                        "inverse-on-surface": "#33302a",
                        "surface-container-high": "#2c2a24",
                        "outline": "#999080",
                        "on-secondary": "#33302a",
                        "surface": "#15130e",
                        "on-error": "#690005",
                        "on-secondary-container": "#bdb8ae",
                        "surface-container": "#221f1a",
                        "on-tertiary": "#202e59",
                        "secondary-container": "#4c4942",
                        "on-secondary-fixed-variant": "#49463f",
                        "secondary-fixed-dim": "#cbc6bc",
                        "on-tertiary-fixed-variant": "#384571",
                        "tertiary": "#b9c6fb",
                        "on-error-container": "#ffdad6",
                        "secondary": "#cbc6bc",
                        "surface-container-highest": "#37342f",
                        "on-background": "#e8e2d9",
                        "tertiary-fixed": "#dce1ff",
                        "error": "#ffb4ab",
                        "on-primary": "#3f2e00",
                        "on-primary-fixed": "#251a00",
                        "inverse-surface": "#e8e2d9",
                        "on-primary-container": "#533d00",
                        "surface-dim": "#15130e",
                        "primary-container": "#c9a961",
                        "on-surface-variant": "#d0c5b4",
                        "surface-container-low": "#1e1b16",
                        "primary-fixed": "#ffdf9b",
                        "surface-variant": "#37342f",
                        "tertiary-fixed-dim": "#b8c5f9",
                        "surface-container-lowest": "#100e09",
                        "tertiary-container": "#9eabde",
                        "on-secondary-fixed": "#1d1b15",
                        "primary": "#e6c479",
                        "on-primary-fixed-variant": "#5a4302",
                        "inverse-primary": "#745b1b",
                        "on-tertiary-container": "#313f6b",
                        "surface-tint": "#e4c278",
                        "on-surface": "#e8e2d9",
                        "outline-variant": "#4d4639",
                        "primary-fixed-dim": "#e4c278",
                        "error-container": "#93000a",
                        "secondary-fixed": "#e8e2d8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "container-max": "1280px",
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "headline-sm": ["Space Grotesk"],
                        "body-md": ["IBM Plex Sans"],
                        "body-lg": ["IBM Plex Sans"],
                        "body-sm": ["IBM Plex Sans"],
                        "label-md": ["IBM Plex Sans"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "1.4", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden selection:bg-primary selection:text-background">
<!-- Background Context (Mocking the "Results" page behind modal) -->
<main class="w-full h-screen p-margin-desktop opacity-20 pointer-events-none transition-opacity duration-700">
<header class="flex justify-between items-center mb-16">
<h1 class="font-headline-lg text-headline-lg tracking-tight">RÉSONA ANALYTICS</h1>
<div class="w-12 h-12 rounded-full border border-outline-variant"></div>
</header>
<div class="grid grid-cols-12 gap-gutter">
<div class="col-span-8 h-96 border border-outline-variant rounded-lg"></div>
<div class="col-span-4 h-96 border border-outline-variant rounded-lg"></div>
<div class="col-span-12 h-64 border border-outline-variant rounded-lg"></div>
</div>
</main>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-[100] modal-blur flex items-center justify-center p-margin-mobile md:p-margin-desktop" id="coverLetterModal">
<!-- Modal Container -->
<div class="relative w-full max-w-[850px] max-h-full bg-surface-container-low border border-outline-variant rounded-lg flex flex-col shadow-2xl overflow-hidden">
<!-- Modal Header -->
<header class="flex items-center justify-between px-8 py-6 border-b border-outline-variant">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="description">description</span>
<h2 class="font-headline-sm text-headline-sm tracking-tight">Generated Cover Letter</h2>
</div>
<button aria-label="Close modal" class="group p-2 hover:bg-surface-container-high transition-colors rounded-full" onclick="closeModal()">
<span class="material-symbols-outlined text-on-surface-variant group-active:scale-90 transition-transform" data-icon="close">close</span>
</button>
</header>
<!-- Scrollable Content Area (The Physical Page feel) -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-8 md:p-12 paper-texture">
<div class="mx-auto bg-surface-container p-10 md:p-16 border border-outline-variant min-h-[1050px] shadow-sm relative">
<!-- Subtle watermark/branding corner -->
<div class="absolute top-8 right-8 opacity-10 select-none">
<span class="font-headline-sm text-headline-sm italic">R.</span>
</div>
<div class="space-y-6">
<!-- Recipient Section -->
<div class="space-y-1 mb-8">
<p class="text-on-surface-variant font-label-md">TO:</p>
<p class="font-medium text-primary">Hiring Committee</p>
<p class="text-on-surface-variant text-body-sm">Lead Technical Architect Role</p>
</div>
<!-- Editable Text Area -->
<textarea class="w-full h-auto min-h-[800px] bg-transparent border-none p-0 focus:ring-0 text-on-background font-body-md leading-relaxed resize-none custom-scrollbar" spellcheck="false">Dear Hiring Committee,

I am writing to express my strong interest in the Lead Technical Architect position. With over a decade of experience in systems design and professional career analytics, I have developed a deep appreciation for the precise minimalism that your firm represents.

At my previous role, I pioneered the integration of high-utility luxury UI frameworks, focusing on technical structured aesthetics that prioritize user data over container ornamentation. This philosophy aligns perfectly with your "reassuring expert" brand identity. My background in precision-engineered instruments has taught me that the most effective interfaces are those that feel quiet and confident, allowing the user's primary focus to remain on factual clarity.

I am particularly drawn to your commitment to architectural blueprints and structural integrity. I have consistently delivered platforms that leverage generous negative space and restricted palettes to direct focus entirely to analytical insights. My technical expertise in managing 12-column fluid grids and maintaining strict typography hierarchies across responsive environments ensures a seamless experience for every stakeholder.

Thank you for your time and consideration. I look forward to discussing how my experience as a senior-level authority in digital design can help advance your mission of factual clarity through elegant, efficient architecture.

Sincerely,

[Your Name]
Career Analyst & Technical Architect</textarea>
</div>
</div>
</div>
<!-- Modal Footer Actions -->
<footer class="p-8 border-t border-outline-variant bg-surface-container-low flex flex-col md:flex-row items-center justify-between gap-6">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="text-on-surface-variant font-label-md tracking-wider">AI-OPTIMIZED FOR MATCH RATE</span>
</div>
<div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
<!-- Secondary Action: Copy -->
<button class="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 border border-primary text-primary font-label-md tracking-widest uppercase hover:bg-primary/10 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="content_copy">content_copy</span>
                        Copy to clipboard
                    </button>
<!-- Primary Action: Export -->
<button class="flex-1 md:flex-none flex items-center justify-center gap-2 px-8 py-3 bg-primary text-background font-label-md tracking-widest uppercase hover:brightness-110 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]" data-icon="picture_as_pdf" data-weight="fill" style="font-variation-settings: 'FILL' 1;">picture_as_pdf</span>
                        Export as PDF
                    </button>
</div>
</footer>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        function closeModal() {
            const modal = document.getElementById('coverLetterModal');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
            modal.style.transition = 'opacity 0.4s ease';
            
            // Re-reveal background for visual effect
            document.querySelector('main').style.opacity = '1';
        }

        // Auto-expand textarea height if content changes (though we set a large min-height)
        const tx = document.querySelector('textarea');
        tx.addEventListener("input", OnInput, false);

        function OnInput() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        }
        
        // Initial call
        window.onload = function() {
            tx.style.height = (tx.scrollHeight) + "px";
        };
    </script>
</body></html>
