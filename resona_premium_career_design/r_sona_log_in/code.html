<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Résona - Precise Career Analytics Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&amp;family=IBM+Plex+Sans:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@100..900&amp;family=Space+Grotesk:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#3c3933",
                    "background": "#15130e",
                    "on-tertiary-fixed": "#091843",
                    "inverse-on-surface": "#33302a",
                    "surface-container-high": "#2c2a24",
                    "outline": "#999080",
                    "on-secondary": "#33302a",
                    "surface": "#15130e",
                    "on-error": "#690005",
                    "on-secondary-container": "#bdb8ae",
                    "surface-container": "#221f1a",
                    "on-tertiary": "#202e59",
                    "secondary-container": "#4c4942",
                    "on-secondary-fixed-variant": "#49463f",
                    "secondary-fixed-dim": "#cbc6bc",
                    "on-tertiary-fixed-variant": "#384571",
                    "tertiary": "#b9c6fb",
                    "on-error-container": "#ffdad6",
                    "secondary": "#cbc6bc",
                    "surface-container-highest": "#37342f",
                    "on-background": "#e8e2d9",
                    "tertiary-fixed": "#dce1ff",
                    "error": "#ffb4ab",
                    "on-primary": "#3f2e00",
                    "on-primary-fixed": "#251a00",
                    "inverse-surface": "#e8e2d9",
                    "on-primary-container": "#533d00",
                    "surface-dim": "#15130e",
                    "primary-container": "#c9a961",
                    "on-surface-variant": "#d0c5b4",
                    "surface-container-low": "#1e1b16",
                    "primary-fixed": "#ffdf9b",
                    "surface-variant": "#37342f",
                    "tertiary-fixed-dim": "#b8c5f9",
                    "surface-container-lowest": "#100e09",
                    "tertiary-container": "#9eabde",
                    "on-secondary-fixed": "#1d1b15",
                    "primary": "#e6c479",
                    "on-primary-fixed-variant": "#5a4302",
                    "inverse-primary": "#745b1b",
                    "on-tertiary-container": "#313f6b",
                    "surface-tint": "#e4c278",
                    "on-surface": "#e8e2d9",
                    "outline-variant": "#4d4639",
                    "primary-fixed-dim": "#e4c278",
                    "error-container": "#93000a",
                    "secondary-fixed": "#e8e2d8"
            },
            "borderRadius": {
                    "DEFAULT": "4px",
                    "lg": "8px",
                    "xl": "12px",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "8px",
                    "container-max": "1280px",
                    "margin-mobile": "20px",
                    "margin-desktop": "64px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Space Grotesk"],
                    "display-lg": ["Space Grotesk"],
                    "headline-md": ["Space Grotesk"],
                    "headline-lg": ["Space Grotesk"],
                    "headline-sm": ["Space Grotesk"],
                    "body-md": ["IBM Plex Sans"],
                    "body-lg": ["IBM Plex Sans"],
                    "body-sm": ["IBM Plex Sans"],
                    "label-md": ["IBM Plex Sans"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-sm": ["20px", {"lineHeight": "1.4", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        
        /* Precise Minimalism Hairlines */
        .hairline-border {
            border: 1px solid #2A2822;
        }

        .focus-ring:focus {
            outline: none;
            border-color: #e6c479;
        }

        /* Ambient subtle grain texture */
        .grain-overlay {
            background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
            opacity: 0.03;
            pointer-events: none;
        }

        /* Step Indicator styling as per guidance */
        .indicator-line {
            height: 1px;
            background-color: #B8AD98;
            width: 100%;
        }
        .indicator-active {
            height: 3px;
            background-color: #e6c479;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col selection:bg-primary/30 selection:text-primary overflow-x-hidden">
<div class="fixed inset-0 grain-overlay z-50"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-12 relative">
<!-- Background Atmospheric Element (Subtle Shader placeholder) -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">

</div>
<!-- Wordmark Anchor -->
<div class="z-10 mb-10 text-center">
<h1 class="font-headline-lg text-headline-lg md:text-display-lg tracking-tight text-on-background">Résona</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-2 uppercase tracking-[0.2em]">Precise Career Analytics</p>
</div>
<!-- Login Card -->
<div class="z-10 w-full max-w-[440px] bg-surface-container-low hairline-border rounded-lg overflow-hidden flex flex-col">
<!-- Contextual Step Indicator for visual flavor (though static here) -->
<div class="w-full flex items-end h-1">
<div class="indicator-active w-1/3"></div>
<div class="indicator-line w-2/3 opacity-30"></div>
</div>
<div class="p-8 md:p-10">
<h2 class="font-headline-sm text-headline-sm mb-8 text-on-surface">Welcome back</h2>
<!-- Login Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="email">Email Address</label>
<input class="w-full bg-transparent hairline-border rounded px-4 py-3 text-body-md placeholder:text-[#B8AD98] focus-ring transition-all" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<input class="w-full bg-transparent hairline-border rounded px-4 py-3 text-body-md placeholder:text-[#B8AD98] focus-ring transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-body-md py-3.5 rounded font-medium hover:bg-primary-container/90 active:scale-[0.98] transition-all flex justify-center items-center gap-2 mt-4" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-md uppercase tracking-widest bg-surface-container-low px-4 text-outline">
                        Or continue with
                    </div>
</div>
<!-- OAuth Actions -->
<div class="grid grid-cols-1 gap-3">
<button class="w-full bg-transparent hairline-border text-on-surface font-body-md py-3 rounded hover:bg-surface-container-high active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined">alternate_email</span>
                        Continue with Google
                    </button>
<button class="w-full bg-transparent hairline-border text-on-surface font-body-md py-3 rounded hover:bg-surface-container-high active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined">work</span>
                        Continue with LinkedIn
                    </button>
</div>
</div>
</div>
<!-- Footer Call-to-Action -->
<div class="z-10 mt-10 flex flex-col items-center gap-4">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-medium hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Sign up</a>
</p>
<div class="flex gap-6 mt-8">
<a class="font-label-md text-label-md text-outline hover:text-on-surface transition-colors uppercase" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-outline hover:text-on-surface transition-colors uppercase" href="#">Terms of Service</a>
</div>
</div>
</main>
<!-- Semantic Footer (Integrated minimally as per design system) -->
<footer class="w-full py-8 border-t border-outline-variant z-10">
<div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-4">
<p class="font-body-sm text-body-sm text-on-surface-variant opacity-60">© 2024 Résona. Precise Minimalism in Career Analytics.</p>
<div class="flex gap-4">
<span class="font-label-md text-label-md text-on-surface-variant/40 flex items-center gap-2">
<span class="material-symbols-outlined" style="font-size: 14px;">verified_user</span>
                    SECURE ENCRYPTION
                </span>
</div>
</div>
</footer>
<script>
        // Micro-interaction for button press effect
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Simple check for password strength placeholder interaction
        const passwordInput = document.getElementById('password');
        passwordInput.addEventListener('input', (e) => {
            if (e.target.value.length > 0) {
                e.target.classList.add('border-primary/50');
            } else {
                e.target.classList.remove('border-primary/50');
            }
        });
    </script>
</body></html>
